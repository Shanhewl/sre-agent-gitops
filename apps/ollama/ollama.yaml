apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # 新增：强制 Pod 调度到有 PV 的节点
      nodeSelector:
        kubernetes.io/hostname: k8s-node2   # 必须和 PV 的 nodeAffinity 一致
      # 新增：定义卷
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        # 新增：将卷挂载到模型目录
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-services:
spec:
  type: NodePort
  selector: { app: ollama }
  ports:
  - port: 11434
    targetPort: 11434
